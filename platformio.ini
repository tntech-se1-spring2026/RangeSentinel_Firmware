; PlatformIO Configuration File
; Project: LoRa Mesh Sensor Network (TTGO LoRa32 V2.1)
; Formal Documentation: https://docs.platformio.org/page/projectconf.html

[platformio]
; When hitting build/upload, default to the sensor node environment
default_envs = sensor_node

; --- Global Settings (Inherited by all environments) ---
[env]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino
monitor_speed = 115200

; Define all shared libraries here. 
; Note: RadioHead is often not in the official registry; 
; using the specific Git or folder name ensures it finds the headers.
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0               ; For structured data exchange
    mikem/RadioHead @ ^1.120                     ; LoRa Physical & Mesh layers
    adafruit/Adafruit SSD1306 @ ^2.5.13          ; OLED driver chip
    adafruit/Adafruit GFX Library @ ^1.11.11     ; Core graphics library
    adafruit/Adafruit BusIO @ ^1.16.1            ; Required dependency for Adafruit screens

; --- Sensor Node Environment ---
[env:sensor_node]
build_flags = 
    -D NODE_TYPE_SENSOR
; Automatically inherits all lib_deps from [env]

; --- Viewing Node Environment (standard hardware) ---
[env:viewing_node]
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv  ; Web server + Mesh stack exceeds default 1.2MB partition
build_flags = 
    -D NODE_TYPE_VIEWER
lib_deps =
    ${env.lib_deps}
    https://github.com/me-no-dev/ESPAsyncWebServer.git ; Async web server for the UI
    https://github.com/me-no-dev/AsyncTCP.git          ; Required dependency for AsyncWebServer

; --- Web Server Test (no viewing node hardware)
[env:viewing_node_test]
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv  
board_build.filesystem_dir = data_viewer
build_flags = 
    -D NODE_TYPE_VIEWER
    -D WEB_TEST_MODE

; We must manually include ${env.lib_deps} here or they will be overwritten
lib_deps =
    ${env.lib_deps}
    https://github.com/me-no-dev/ESPAsyncWebServer.git ; Async web server for the UI
    https://github.com/me-no-dev/AsyncTCP.git          ; Required dependency for AsyncWebServer