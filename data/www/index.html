<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <title>Range Sentinel</title>
    <style>
        .chosenFont {
            font-family: helvetica;
        }
    </style>
</head>
<body style="background-color: #1d5e66;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">
                <div class="banner">
                    <h1 class="chosenFont" style="color: #2d2d2d;">Range Sentinel</h1>
                </div>
            </a>
            <div class="btn-group dropstart" id="action_items">
                <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" data-bs-auto-close="false" aria-expanded="false">
                    <img src="img/notifications.svg" style="margin-right: 10px;" alt="notifications">
                </button>
                <ul class="dropdown-menu" id="notification-dropdown">
                    <!--<li><a class="dropdown-item" href="#" style="display: none;">No new notifications</a></li>
                    <li><a class="dropdown-item chosenFont" href="#">Notification 1</a></li>
                    <li><a class="dropdown-item active chosenFont" href="#">Notification 2</a></li>
                    <li><a class="dropdown-item-text chosenFont" href="#">Notification 3</a></li>
                    <p class="chosenFont">You can also do freeform text in dropdowns</p>-->
                </ul>
                <img src="img/notifications_unread.svg" style="margin-right: 10px; display: none;" alt="unread notifications">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="chosenFont" style="color: #fafafa;">Device Status</h1>
        <button class="btn btn-primary mb-3" id="notif-button">Get Notif</button>
        <p class="chosenFont" style="color: #fafafa;" id="device-total"><!-- device total --></p>
        <div class="row g-3" id="node-cards"></div>
    </div>
    <script type="module" src="js/main.js"></script>
    <script>
    </script>
</body>
</html>
