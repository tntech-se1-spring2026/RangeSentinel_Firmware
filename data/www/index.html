<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="favicon.png"/>
    <script src="js/bootstrap.bundle.min.js"></script>
    <title>Range Sentinel</title>
    <style>
        .card-body {
            min-height: 140px;
        }
        .card-value {
            font-size: 2rem;
            font-weight: 600;
        }
    </style>
</head>
<body style="background-color: #1d5e66;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">
                <div class="banner">
                    <h1 style="color: #2d2d2d; font-family: helvetica;">Range Sentinel</h1>
                </div>
            </a>
            <div id="action_items">
                <img src="img/notifications.svg" alt="notifications">
                <img src="img/notifications_unread.svg" alt="unread notifications" style="display: none;">
                <img src="img/menu.svg" alt="menu">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
    <h1 style="color: #fafafa; font-family: helvetica;">Status</h1>

    <div class="row g-3"> <!-- First Row of 3 Cards -->
        <!-- Card 1 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Temperature</h5>
                    <p class="card-value">23.5 °C</p>
                    <p class="card-text text-muted">
                        Last updated: 10s ago
                    </p>
                </div>
            </div>
        </div>
        <!-- Card 2 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Humidity</h5>
                    <p class="card-value">56 %</p>
                    <p class="card-text text-muted">
                        Normal range
                    </p>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Gate Sensor</h5>
                    <p class="card-value text-success">Online</p>
                    <p class="card-text text-muted">
                        ESP32 connected
                    </p>
                </div>
            </div>
        </div>

    </div> <!-- End of First Row -->
    <div class="row g-3 mt-0"> <!-- Second Row of 2 Cards -->
        <!-- Card 4 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Device 1</h5>
                    <p class="card-value text-danger">Offline</p>
                    <p class="card-text text-muted">
                        Last seen: 5 mins ago
                    </p>
                </div>
            </div>
        </div>
        <!-- Card 5 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Device 2</h5>
                    <p class="card-value text-success">Online</p>
                    <p class="card-text text-muted">
                        Active for 2 weeks
                    </p>
                </div>
            </div>
        </div>
        <!-- Card 6 -->
        <div class="col-12 col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Device 3</h5>
                    <p class="card-value text-success">Online</p>
                    <p class="card-text text-muted">
                        Active for 5 days
                    </p>
                </div>
            </div>
        </div>
    </div> <!-- End of Second Row -->
</div>
    <div class="container mt-3">
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm border-info">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title">Simulation Control</h5>
                            <p class="card-text">System State: <strong id="simStatusText">Checking...</strong></p>
                        </div>
                        <button class="btn btn-outline-info" onclick="toggleSimulation()">Toggle Sim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button class="btn btn-primary" type="button" id="test-button">Test</button>
    <script type="module" src="js/main.js"></script>
    <script>
    // Logic to talk to the ESP32
    async function toggleSimulation() {
        await fetch('/web/simulate', { method: 'POST' });
        updateSimUI();
    }

    async function updateSimUI() {
        const response = await fetch('/web/simulate');
        const status = await response.text();
        const el = document.getElementById('simStatusText');
        el.innerText = status;
        el.style.color = status.includes(" ACTIVE") ? "#28a745" : "#6c757d";
    }

    // Run on load
    window.onload = updateSimUI;

    // Open the real-time pipe to the ESP32
    const socket = new WebSocket('ws://' + window.location.hostname + '/ws');

    // This function runs every time the simulation sends dummy data
    socket.onmessage = function(event) {
        console.log("REAL-TIME DATA RECEIVED:");
        const data = JSON.parse(event.data);
        console.log(data); // This will show you the battery/door values
    };

    socket.onopen = function() {
        console.log("WebSocket Connection Established!");
    };
</script>
</body>
</html>
