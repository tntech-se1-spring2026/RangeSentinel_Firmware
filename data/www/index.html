<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <title>Range Sentinel</title>
    <style>
        .chosenFont {
            font-family: helvetica;
        }
        .highlight {
            box-shadow: 0 0 20px red;
            transition: 0.3s ease-in-out;
        }
    </style>
</head>
<body style="background-color: #1d5e66;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand">
                <div class="banner">
                    <h1 class="chosenFont" style="color: #2d2d2d;">Range Sentinel</h1>
                </div>
            </a>
            <div class="btn-group dropstart" id="action_items"> <!-- button to open notification dropdown -->
                <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" data-bs-auto-close="inside" aria-expanded="false">
                    <img src="img/notifications.svg" style="margin-right: 10px;" alt="notifications">
                </button>
                <ul class="dropdown-menu" id="notification-dropdown"> <!-- dropdown menu for notifications -->
                    
                </ul>
                <img src="img/notifications_unread.svg" style="margin-right: 10px; display: none;" alt="unread notifications"> <!-- icon for unread notifications -->
            </div>
        </div>
    </nav>

    <div class="container g-3 mt-4"> <!-- remember, container -> row -> col -> card -->
        <h1 class="chosenFont" style="color: #fafafa;">Device Status</h1>
        <button class="btn btn-primary mb-3" id="notif-button">Get Notif</button> <!-- button to test notification retrieval -->
        <p class="chosenFont" style="color: #fafafa;" id="device-total"><!-- device total --></p>
        <div class="row g-3" id="node-cards"></div> <!-- defines the rows for cards -->
    </div>
    <script type="module" src="js/main.js"></script>
    <script>
    </script>
</body>
</html>
